<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy-Based Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Energy-Based Planner</h1>

<!-- Add Task Section -->
<section>

<h2>Add a Task</h2>

<input
type="text"
id="taskName"
placeholder="Task name"
/>

<select id="taskEnergy">
<option value="">Energy required</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<input
type="number"
id="taskTime"
placeholder="Time required (minutes)"
min="1"
/>

<button id="addTaskBtn" type="button">
Add Task
</button>

</section>

<!-- Current Energy Section -->
<section>

<h2>Current Energy</h2>

<button id="lowEnergy">Low</button>
<button id="mediumEnergy">Medium</button>
<button id="highEnergy">High</button>

</section>

<!-- Suggested Tasks Section -->
<section>

<h2>Suggested Tasks</h2>

<ul id="suggestedTasks"></ul>

</section>

<!-- All Tasks Section -->
<section>

<h2>All Tasks</h2>

<ul id="taskList"></ul>

</section>

<script src="script.js"></script>

</body>
</html>
